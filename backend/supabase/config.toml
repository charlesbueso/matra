[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["exp://", "matra://"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.apple]
enabled = false

[auth.external.google]
enabled = false

[storage]
enabled = true
file_size_limit = "100MB"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

# Disable runtime-level JWT verification — functions handle auth via getUser()
[functions.process-interview]
verify_jwt = false

[functions.generate-biography]
verify_jwt = false

[functions.get-entitlements]
verify_jwt = false

[functions.validate-subscription]
verify_jwt = false

[functions.export-memory-book]
verify_jwt = false

[functions.export-my-data]
verify_jwt = false
